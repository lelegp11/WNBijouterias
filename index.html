<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>WN Bijouterias</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar-laranja">
    <img src="assets/logo_venda_suite.svg" class="logo-topo" onclick="voltarHome()">

    <div class="bottom-icons">
        <img src="assets/icone_sair.svg">
        <img src="assets/icone_configuracoes.svg">
    </div>
</div>

<div class="sidebar-cinza">
    <div class="menu-item active" onclick="abrirMostruario()">
        <img src="assets/icone_anel.svg">
        <span>MOSTRUÁRIO</span>
    </div>

    <div class="menu-item">
        <img src="assets/icone_vendedora.svg">
        <span>VENDEDORAS</span>
    </div>

    <div class="menu-item">
        <img src="assets/icone_acerto.svg">
        <span>ACERTO</span>
    </div>

    <div class="menu-item">
        <img src="assets/icone_cadastro_produto.svg">
        <span>CADASTRO PRODUTO</span>
    </div>
</div>

<!-- CONTEÚDO -->
<div class="conteudo">

    <!-- MOSTRUÁRIO LISTA -->
    <div id="telaMostruario" class="tela ativa">

        <div class="topo">
            MOSTRUÁRIO
        </div>

        <!-- 🔎 BUSCA CORRIGIDA -->
        <div class="barra-busca">

            <div class="campo-busca">
                <img src="assets/icone_lupa.svg" class="icone-lupa">

                <input type="text" placeholder="Pesquisar por nº, vendedora ou data">

                <select>
                    <option>Nº Mostruário</option>
                    <option>Vendedora</option>
                    <option>Data</option>
                </select>
            </div>

            <button class="btn-azul">Pesquisar</button>

            <button class="btn-azul direita" onclick="abrirNovo()">
                NOVO MOSTRUÁRIO
            </button>

        </div>

        <!-- TABELA -->
        <div class="tabela">
            <div class="linha header">
                <div>Mostruário</div>
                <div>Vendedora</div>
                <div>Qtd.</div>
                <div>Data</div>
                <div>Ações</div>
            </div>

            <div class="linha">
                <div>01</div>
                <div>Vendedora</div>
                <div>100</div>
                <div>00/00/00</div>
                <div>•••</div>
            </div>
        </div>

    </div>

</div>

<!-- SCRIPT -->
<script>
function abrirNovo(){
    alert("Abrir novo mostruário");
}

function voltarHome(){
    alert("Voltar para tela inicial");
}

function abrirMostruario(){
    alert("Você já está no mostruário");
}
</script>

</body>
</html>
