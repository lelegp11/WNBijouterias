<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>WN Bijouterias</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- MENU -->
  <aside class="leftbar">
    <button class="nav-btn" data-target="home">🏠</button>
    <button class="nav-btn" data-target="mostruario">💍</button>
    <button class="nav-btn" data-target="vendedoras">👩</button>
    <button class="nav-btn" data-target="produtos">📦</button>
    <button class="nav-btn" data-target="acerto">💰</button>
  </aside>

  <!-- CONTEÚDO -->
  <main class="content">

    <!-- HOME -->
    <section id="home" class="screen active">
      <h1>WN BIJOUTERIAS</h1>
    </section>

    <!-- MOSTRUÁRIO -->
    <section id="mostruario" class="screen">
      <div class="top-bar">MOSTRUÁRIO</div>
      <button class="btn" id="btnNovoMostruario">Novo</button>

      <table>
        <thead>
          <tr>
            <th>Nº</th>
            <th>Vendedora</th>
            <th>Total</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaMostruario"></tbody>
      </table>
    </section>

    <!-- VENDEDORAS -->
    <section id="vendedoras" class="screen">
      <div class="top-bar">VENDEDORAS</div>

      <button class="btn" id="btnNovaVendedora">Nova</button>

      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Nome</th>
            <th>Último</th>
            <th>Próximo</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaVendedoras"></tbody>
      </table>
    </section>

    <!-- PRODUTOS -->
    <section id="produtos" class="screen">
      <div class="top-bar">PRODUTOS</div>

      <button class="btn" id="btnNovoProduto">Novo</button>

      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Descrição</th>
            <th>Preço</th>
            <th>Data</th>
          </tr>
        </thead>
        <tbody id="tabelaProdutos"></tbody>
      </table>
    </section>

    <!-- ACERTO -->
    <section id="acerto" class="screen">
      <div class="top-bar">ACERTO</div>

      <div class="grid">
        <input id="acertoCodigoVendedora" placeholder="Cód. Vendedora">
        <input id="acertoNomeVendedora" placeholder="Nome" readonly>
      </div>

      <div class="grid">
        <input id="acertoCodigoProduto" placeholder="Cód Produto">
        <input id="acertoDescricaoProduto" placeholder="Descrição" readonly>
        <input id="acertoQtdRetirada" placeholder="Retirada" readonly>
        <input id="acertoQtdDevolvida" placeholder="Devolvida">
      </div>

      <div id="listaAcerto"></div>

      <h3>Total: <span id="totalAcerto">R$ 0,00</span></h3>
    </section>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
