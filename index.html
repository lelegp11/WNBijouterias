<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WN Bijouterias</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- MENU LATERAL -->
  <aside class="leftbar">
    <div class="top-logo nav-btn" data-target="home">
      <img src="assets/logo_venda_suite.svg" class="icon-img">
    </div>

    <div class="bottom-actions">
      <button class="icon-btn nav-btn" data-target="logout">
        <img src="assets/icone_sair.svg" class="icon-img">
      </button>

      <button class="icon-btn nav-btn" data-target="configuracoes">
        <img src="assets/icone_configuracoes.svg" class="icon-img">
      </button>
    </div>
  </aside>

  <div class="rail">
    <div class="menu-slot ring nav-btn" data-target="mostruario">
      <button class="icon-btn"><img src="assets/icone_anel.svg" class="icon-img"></button>
      <div class="slide-label">MOSTRUÁRIO</div>
    </div>

    <div class="menu-slot seller nav-btn" data-target="vendedoras">
      <button class="icon-btn"><img src="assets/icone_vendedora.svg" class="icon-img"></button>
      <div class="slide-label">VENDEDORAS</div>
    </div>
  </div>

  <main class="content">

    <!-- HOME -->
    <section id="home" class="screen active">
      <div class="card">
        <h1>WN BIJOUTERIAS</h1>
        <p>Sistema de gestão</p>
      </div>
    </section>

    <!-- MOSTRUÁRIO -->
    <section id="mostruario" class="screen">
      <div class="panel">

        <div class="top-bar top-bar-mostruario top-bar-lista">
          MOSTRUÁRIO
        </div>

        <div class="toolbar">
          <button class="btn blue" id="btnNovoMostruario">
            NOVO MOSTRUÁRIO
          </button>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th>Mostruário</th>
              <th>Cód.</th>
              <th>Vendedora</th>
              <th>Qtd.</th>
              <th>Último Acerto</th>
              <th>Próximo Acerto</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="mostruarioTabelaBody"></tbody>
        </table>

      </div>
    </section>

    <!-- CADASTRO MOSTRUÁRIO -->
    <section id="mostruario-incluir" class="screen">
      <div class="mostruario-page">

        <div class="top-bar top-bar-mostruario">
          MOSTRUÁRIO
        </div>

        <div class="include-wrap">

          <div class="include-top">
            <div class="voltar nav-btn" data-target="mostruario">← VOLTAR</div>

            <div>
              <button class="btn primary" id="btnSalvarMostruario">Salvar</button>
            </div>
          </div>

          <div class="include-grid">

            <div class="field">
              <label>Nº Mostruário</label>
              <input id="numeroMostruario">
            </div>

            <div class="field">
              <label>Cód. Vendedora</label>
              <input id="codigoVendedoraMostruario">
            </div>

            <div class="field">
              <label>Nome</label>
              <input id="nomeVendedoraMostruario" readonly>
            </div>

            <div class="field">
              <label>Último Acerto</label>
              <input id="dataUltimoAcertoMostruario">
            </div>

            <div class="field">
              <label>Próximo Acerto</label>
              <input id="dataProximoAcertoMostruario">
            </div>

          </div>

        </div>
      </div>
    </section>

    <!-- VENDEDORAS -->
    <section id="vendedoras" class="screen">
      <div class="panel">

        <div class="top-bar top-bar-vendedora top-bar-lista">
          VENDEDORAS
        </div>

        <div class="toolbar">
          <button class="btn blue nav-btn" data-target="vendedora-cadastro">
            NOVA VENDEDORA
          </button>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th>Código</th>
              <th>Nome</th>
              <th>Último Acerto</th>
              <th>Próximo Acerto</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="vendedoraTabelaBody"></tbody>
        </table>

      </div>
    </section>

    <!-- CADASTRO VENDEDORA -->
    <section id="vendedora-cadastro" class="screen">
      <div class="vendedora-page">

        <div class="top-bar top-bar-vendedora">
          VENDEDORA
        </div>

        <div class="include-wrap">

          <div class="include-top">
            <div class="voltar nav-btn" data-target="vendedoras">← VOLTAR</div>
            <button class="btn primary" id="btnSalvarVendedora">Salvar</button>
          </div>

          <div class="vendedora-grid">

            <div class="field">
              <label>Código</label>
              <input id="vendedoraCodigo">
            </div>

            <div class="field">
              <label>Nome</label>
              <input id="vendedoraNome">
            </div>

            <div class="field">
              <label>Último Acerto</label>
              <input id="vendedoraUltimoAcerto" readonly>
            </div>

            <div class="field">
              <label>Próximo Acerto</label>
              <input id="vendedoraProximoAcerto" readonly>
            </div>

          </div>

        </div>
      </div>
    </section>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
